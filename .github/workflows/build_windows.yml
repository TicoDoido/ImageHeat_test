name: Build ImageHeat (Windows)

# Triggers the workflow on pushes to any branch and on tags
on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable with cx_Freeze
        run: |
          python setup.py build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageHeat-Windows
          path: build_final/ImageHeat/*

      # Optional: create a release when a tag is pushed
      - name: Create Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build_final/ImageHeat/*
